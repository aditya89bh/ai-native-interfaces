<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Repository overview: source layers are developed with Storybook and tests, bundled by tsup into dist, published to npm and GitHub Pages, and gated by CI/CD workflows.">
  <rect width="960" height="540" rx="16" fill="#f8fafc"/>
  <text x="32" y="46" font-size="22" font-weight="700" fill="#0f172a">ai-native-interfaces  repository overview</text>
  <text x="32" y="70" font-size="13" fill="#64748b">Source is developed with Storybook and tests, bundled by tsup, and released to npm and GitHub Pages  all gated by CI/CD.</text>

  <!-- Column 1: Source -->
  <rect x="32" y="96" width="260" height="300" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="48" y="122" font-size="14" font-weight="700" fill="#0f172a">Source (src/)</text>

  <rect x="48" y="230" width="228" height="46" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="60" y="252" font-size="12" font-weight="700" fill="#065f46">tokens</text>
  <text x="60" y="268" font-size="11" fill="#047857">color À status À spacing À motion</text>

  <rect x="48" y="176" width="228" height="46" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="60" y="198" font-size="12" font-weight="700" fill="#334155">components (25)</text>
  <text x="60" y="214" font-size="11" fill="#64748b">agent À trust À memory À workflow À collab</text>

  <rect x="48" y="136" width="228" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="157" font-size="12" font-weight="700" fill="#3730a3">templates (5)</text>

  <rect x="48" y="284" width="228" height="40" rx="8" fill="#fef9c3" stroke="#fde68a"/>
  <text x="60" y="308" font-size="12" font-weight="700" fill="#854d0e">theme  cross-cutting (light/dark/tokens)</text>

  <rect x="48" y="332" width="228" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="60" y="356" font-size="11" fill="#64748b">index.ts + subpath barrels Æ public API</text>

  <!-- Column 2: Develop & verify -->
  <rect x="332" y="96" width="260" height="300" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="348" y="122" font-size="14" font-weight="700" fill="#0f172a">Develop &amp; verify</text>

  <rect x="348" y="140" width="228" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="360" y="162" font-size="12" font-weight="700" fill="#334155">Storybook</text>
  <text x="360" y="180" font-size="11" fill="#64748b">stories À autodocs À theme toolbar À a11y</text>

  <rect x="348" y="200" width="228" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="360" y="222" font-size="12" font-weight="700" fill="#334155">Vitest + Testing Library</text>
  <text x="360" y="240" font-size="11" fill="#64748b">206 unit tests (jsdom)</text>

  <rect x="348" y="260" width="228" height="52" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="360" y="282" font-size="12" font-weight="700" fill="#334155">ESLint À Prettier À TypeScript</text>
  <text x="360" y="300" font-size="11" fill="#64748b">lint À format À strict types</text>

  <rect x="348" y="320" width="228" height="52" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="360" y="342" font-size="12" font-weight="700" fill="#3730a3">tsup</text>
  <text x="360" y="360" font-size="11" fill="#4338ca">ESM + d.ts À code splitting À treeshake</text>

  <!-- Column 3: Distribute -->
  <rect x="632" y="96" width="296" height="300" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="648" y="122" font-size="14" font-weight="700" fill="#0f172a">Distribute</text>

  <rect x="648" y="140" width="264" height="60" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="660" y="162" font-size="12" font-weight="700" fill="#065f46">dist/</text>
  <text x="660" y="180" font-size="11" fill="#047857">index À components À templates À theme À tokens</text>
  <text x="660" y="194" font-size="11" fill="#047857">+ styles.css À type declarations</text>

  <rect x="648" y="210" width="264" height="54" rx="8" fill="#fee2e2" stroke="#fecaca"/>
  <text x="660" y="232" font-size="12" font-weight="700" fill="#991b1b">npm package</text>
  <text x="660" y="250" font-size="11" fill="#b91c1c">published on GitHub Release (provenance)</text>

  <rect x="648" y="274" width="264" height="54" rx="8" fill="#e0f2fe" stroke="#bae6fd"/>
  <text x="660" y="296" font-size="12" font-weight="700" fill="#075985">GitHub Pages</text>
  <text x="660" y="314" font-size="11" fill="#0369a1">Storybook docs site (deployed from main)</text>

  <rect x="648" y="338" width="264" height="34" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="660" y="359" font-size="11" fill="#64748b">consumers import only what they use</text>

  <!-- Arrows between columns -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M292 246 L332 246"/>
    <path d="M592 246 L632 246"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- CI/CD band -->
  <rect x="32" y="416" width="896" height="92" rx="12" fill="#0f172a"/>
  <text x="48" y="442" font-size="14" font-weight="700" fill="#f8fafc">CI/CD (.github/workflows)</text>
  <g font-size="11" fill="#e2e8f0">
    <rect x="48" y="454" width="150" height="40" rx="8" fill="#1e293b"/>
    <text x="60" y="470" font-weight="700" fill="#f8fafc">CI</text>
    <text x="60" y="486">lintÀtypeÀtestÀbuild</text>

    <rect x="212" y="454" width="150" height="40" rx="8" fill="#1e293b"/>
    <text x="224" y="470" font-weight="700" fill="#f8fafc">Docs</text>
    <text x="224" y="486">Pages deploy</text>

    <rect x="376" y="454" width="160" height="40" rx="8" fill="#1e293b"/>
    <text x="388" y="470" font-weight="700" fill="#f8fafc">Release</text>
    <text x="388" y="486">npm publish (tag)</text>

    <rect x="550" y="454" width="170" height="40" rx="8" fill="#1e293b"/>
    <text x="562" y="470" font-weight="700" fill="#f8fafc">Visual regression</text>
    <text x="562" y="486">Chromatic</text>

    <rect x="734" y="454" width="178" height="40" rx="8" fill="#1e293b"/>
    <text x="746" y="470" font-weight="700" fill="#f8fafc">Dependabot</text>
    <text x="746" y="486">weekly updates</text>
  </g>
</svg>
