version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: build
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # React is a peer dependency; consumers own the version.
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
