name: Bug report
description: Report a defect in a component, type, or build output.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in as much as you can.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a link to a minimal reproduction (StackBlitz, CodeSandbox, or repo).
      placeholder: |
        1. Render `<ConfidenceIndicator level="high" />`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent state
        - Trust & decision
        - Memory
        - Workflow & execution
        - Human collaboration
        - Templates
        - Theming
        - Tokens
        - Build / types
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: React version, bundler, browser/OS, and anything else relevant.
      placeholder: |
        - React: 18.3.1
        - Bundler: Vite 5
        - Browser/OS: Chrome 126 / macOS 14
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is reproducible on the latest version.
          required: true
