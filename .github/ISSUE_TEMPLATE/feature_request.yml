name: Feature request
description: Propose a new component, prop, or capability.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Proposals that fit the library's scope — presentational, accessible AI-native primitives — are most likely to be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or product problem does this address? What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the component, prop, or behavior. Include a sketch of the API if you can.
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - New component
        - New prop or variant on an existing component
        - New template
        - Token or theming capability
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferable.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This keeps components presentational (no backend, agent framework, or state library).
          required: true
